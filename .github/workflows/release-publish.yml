name: 'Release: Publish'

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

env:
  NODE_OPTIONS: '--max-old-space-size=8192'

jobs:
  publish-to-npm:
    name: Publish to NPM
    runs-on: ubuntu-slim
    timeout-minutes: 10
    outputs:
      create: ${{ steps.check-release.outputs.create }}
      release: ${{ steps.get-version.outputs.release }}
    steps:
      - uses: actions/checkout@v6

      - name: Get Version
        id: get-version
        run: |
          LATEST_TAG=$(curl -sSL "https://github.com/n8n-io/n8n/raw/refs/tags/stable/package.json" | jq -r .version)
          if [ -z "${LATEST_TAG}" ] || [ "${LATEST_TAG}" == "null" ]; then
            echo "Failed to get version"
            exit 1
          fi

          # LATEST_TAG=n8n@1.91.3, get 1.91.3
          N8N_VERSION=$(echo "${LATEST_TAG}" | cut -d "@" -f 2)

          echo "release=${N8N_VERSION}" >> $GITHUB_OUTPUT
          echo "N8N_VERSION=${N8N_VERSION}" >> $GITHUB_ENV
          echo ""
          echo "========== Build Args =========="
          echo "N8N_VERSION=${N8N_VERSION}"

      - name: Check Release
        id: check-release
        run: |
          gh release view n8n@${N8N_VERSION} -R ${{ github.repository }} >/dev/null 2>&1 || echo "create=1" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-to-docker-hub:
    name: Publish to DockerHub
    needs: [publish-to-npm]
    runs-on: ubuntu-latest
    if: needs.publish-to-npm.outputs.create == '1'
    # timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: n8n-io/n8n
          ref: 'n8n@${{ needs.publish-to-npm.outputs.release }}'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          mkdir -p /tmp/isolated-vm
          ISOLATED_VM_VERSION=$(yq '.catalog.isolated-vm' pnpm-workspace.yaml | sed 's/\^//')
          wget -qO - https://registry.npmjs.org/@loong64/isolated-vm/-/isolated-vm-${ISOLATED_VM_VERSION}.tgz | tar xz --strip-components=1 -C /tmp/isolated-vm
          wget -qO - https://github.com/loong64/n8n/raw/refs/heads/main/patch_loong64.patch | patch -p1
          pnpm install --frozen-lockfile

      - name: Build n8n for Docker
        run: |
          pnpm build:n8n
          mv /tmp/isolated-vm/prebuilds/linux-loong64 dist/task-runner-javascript/node_modules/isolated-vm/prebuilds/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push n8n Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/images/n8n/Dockerfile
          build-args: |
            N8N_VERSION=${{ needs.publish-to-npm.outputs.release }}
            N8N_RELEASE_TYPE=stable
            UV_VERSION=0.11.16
          platforms: linux/loong64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/n8nio/n8n:${{ needs.publish-to-npm.outputs.release }}
            ghcr.io/${{ github.repository_owner }}/n8nio/n8n:stable
            ghcr.io/${{ github.repository_owner }}/n8nio/n8n:latest

      - name: Build and push task runners Docker image (Alpine)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/images/runners/Dockerfile
          build-args: |
            N8N_VERSION=${{ needs.publish-to-npm.outputs.release }}
            N8N_RELEASE_TYPE=stable
            UV_VERSION=0.11.16
          platforms: linux/loong64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/n8nio/runners:${{ needs.publish-to-npm.outputs.release }}
            ghcr.io/${{ github.repository_owner }}/n8nio/runners:stable
            ghcr.io/${{ github.repository_owner }}/n8nio/runners:latest

  create-github-release:
    name: Create a GitHub Release
    needs: [publish-to-npm, publish-to-docker-hub]
    runs-on: ubuntu-slim
    if: needs.publish-to-npm.outputs.create == '1'
    timeout-minutes: 5

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create a Release on GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: n8n@${{ needs.publish-to-npm.outputs.release }}
          tag_name: n8n@${{ needs.publish-to-npm.outputs.release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}